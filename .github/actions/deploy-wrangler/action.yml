name: Deploy with Wrangler
description: Wrapper around cloudflare/wrangler-action with centralized config

inputs:
  api-token:
    required: true
    description: Cloudflare API token
  account-id:
    required: true
    description: Cloudflare account ID
  command:
    required: true
    description: Wrangler command to run (e.g. "deploy", "d1 migrations apply ...")
  working-directory:
    required: false
    default: "."
    description: Working directory for wrangler
  env-flag:
    required: false
    default: ""
    description: Wrangler --env flag value (empty for prod)

runs:
  using: composite
  steps:
    - uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ inputs.api-token }}
        accountId: ${{ inputs.account-id }}
        wranglerVersion: "4.78.0"
        workingDirectory: ${{ inputs.working-directory }}
        command: >-
          ${{ inputs.command }}
          ${{ inputs.env-flag != '' && format('--env {0}', inputs.env-flag) || '' }}
