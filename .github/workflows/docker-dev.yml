name: Docker Dev

on:
  push:
    branches: [develop]

concurrency:
  group: docker-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-deploy:
    uses: ./.github/workflows/docker-build-deploy.yml
    with:
      image_tag: develop
      cargo_profile: debug
    secrets:
      coolify_webhook: ${{ secrets.COOLIFY_WEBHOOK_DEV }}
      coolify_token: ${{ secrets.COOLIFY_TOKEN }}
