name: Docker Dev

on:
  push:
    branches: [develop]

concurrency:
  group: docker-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/docker-build.yml
    with:
      image_tag: develop
      cargo_profile: debug
    secrets: inherit

  deploy:
    permissions: {}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Coolify
        run: |
          curl -fsSL -X GET "${{ secrets.COOLIFY_WEBHOOK_DEV }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
