name: Check outdated dependencies

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  cargo-outdated:
    name: Check Cargo dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-outdated
        run: cargo install cargo-outdated

      - name: Check outdated dependencies
        id: outdated
        run: |
          OUTPUT=$(cargo outdated -R --exit-code 1 2>&1) || true
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Check if there are actual outdated deps (not just header lines)
          if echo "$OUTPUT" | grep -qE '^\S+\s+\S+\s+\S+\s+\S+\s+\S+'; then
            echo "has_outdated=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_outdated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update issue
        if: steps.outdated.outputs.has_outdated == 'true'
        uses: actions/github-script@v7
        env:
          OUTDATED_RESULT: ${{ steps.outdated.outputs.result }}
        with:
          script: |
            const title = 'Outdated Cargo dependencies';
            const date = new Date().toISOString().split('T')[0];
            const serverUrl = process.env.GITHUB_SERVER_URL;
            const repo = process.env.GITHUB_REPOSITORY;
            const result = process.env.OUTDATED_RESULT;
            const body = [
              '## Outdated Cargo Dependencies',
              '',
              'Found outdated dependencies in the workspace:',
              '',
              '```',
              result,
              '```',
              '',
              '**Legend:** Project = current version, Compat = latest compatible, Latest = newest available',
              '',
              `_Auto-generated by [deps-outdated workflow](${serverUrl}/${repo}/actions/workflows/deps-outdated.yml) on ${date}_`,
            ].join('\n');

            // Find existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies,rust',
              creator: 'github-actions[bot]',
            });

            const existing = issues.data.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              console.log(`Updated issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['dependencies', 'rust'],
              });
              console.log(`Created issue #${created.data.number}`);
            }
