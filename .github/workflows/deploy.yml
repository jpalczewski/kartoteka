name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "GitHub Environment name (dev or production)"
      wrangler_env:
        required: false
        type: string
        default: ""
        description: "Wrangler --env flag value (empty for prod)"
      d1_database:
        required: true
        type: string
        description: "D1 database name for API migrations"

permissions:
  contents: read

jobs:
  # --- API Worker + Gateway (sequential, gateway depends on API) ---
  deploy-backend:
    name: Backend (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-backend-${{ inputs.environment }}
      cancel-in-progress: ${{ inputs.environment == 'dev' }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: deploy

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: gateway/package-lock.json

      - uses: cargo-bins/cargo-binstall@main

      - name: Install worker-build
        run: cargo binstall worker-build --no-confirm

      # API Worker
      - name: Run D1 migrations
        uses: ./.github/actions/deploy-wrangler
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          working-directory: crates/api
          command: "d1 migrations apply ${{ inputs.d1_database }} --remote"
          env-flag: ${{ inputs.wrangler_env }}

      - name: Deploy API Worker
        uses: ./.github/actions/deploy-wrangler
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          working-directory: crates/api
          command: deploy
          env-flag: ${{ inputs.wrangler_env }}

      # Gateway Worker
      - name: Copy locales to gateway
        run: |
          cp -r locales gateway/locales
          cp locales/en/mcp.ftl gateway/locales/en/mcp.txt
          cp locales/pl/mcp.ftl gateway/locales/pl/mcp.txt

      - name: Install gateway deps
        run: cd gateway && npm ci

      - name: Deploy Gateway Worker
        uses: ./.github/actions/deploy-wrangler
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          working-directory: gateway
          command: deploy
          env-flag: ${{ inputs.wrangler_env }}

      - name: Run Gateway auth migrations
        env:
          GATEWAY_URL: ${{ secrets.GATEWAY_URL }}
          MIGRATE_SECRET: ${{ secrets.MIGRATE_SECRET }}
        run: |
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" -X POST "$GATEWAY_URL/migrate" \
            -H "x-migrate-secret: $MIGRATE_SECRET")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Gateway migration failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Gateway migration completed (HTTP $HTTP_CODE)"
