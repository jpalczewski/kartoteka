name: Security Audit

on:
  push:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/*/Cargo.toml"
  schedule:
    - cron: "0 8 * * 1"

permissions:
  issues: write

jobs:
  audit:
    name: RustSec Advisory Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/audit@v1
        name: Audit Rust dependencies
