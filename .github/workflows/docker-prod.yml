name: Docker Prod

on:
  push:
    tags: ['v*']

concurrency:
  group: docker-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/docker-build.yml
    with:
      image_tag: latest
      cargo_profile: release
      extra_tags: |
        ${{ github.ref_name }}
    secrets: inherit

  deploy:
    permissions: {}
    needs: [build]
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Coolify
        run: |
          curl -fsSL -X GET "${{ secrets.COOLIFY_WEBHOOK_PROD }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
