name: Docker Preview

on:
  pull_request:
    branches: [develop, main]

concurrency:
  group: docker-preview
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-deploy:
    uses: ./.github/workflows/docker-build-deploy.yml
    with:
      image_tag: preview
      cargo_profile: debug
    secrets:
      coolify_webhook: ${{ secrets.COOLIFY_WEBHOOK_PREVIEW }}
      coolify_token: ${{ secrets.COOLIFY_TOKEN }}
