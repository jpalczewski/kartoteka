name: Docker Preview

on:
  pull_request:
    branches: [develop, main]

concurrency:
  group: docker-preview
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/docker-build.yml
    with:
      image_tag: preview
      cargo_profile: debug
    secrets: inherit

  deploy:
    permissions: {}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Coolify
        run: |
          curl -fsSL -X GET "${{ secrets.COOLIFY_DEPLOY_PREVIEW }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
