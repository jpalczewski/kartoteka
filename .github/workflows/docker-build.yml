name: Docker Build

on:
  workflow_call:
    inputs:
      image_tag:
        description: Primary tag for the pushed image
        required: true
        type: string
      cargo_profile:
        description: debug or release
        required: true
        type: string
      extra_tags:
        description: Newline-separated additional tags
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble tags
        id: tags
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          EXTRA_TAGS: ${{ inputs.extra_tags }}
          REPO: ${{ github.repository }}
        run: |
          TAGS="ghcr.io/${REPO}:${IMAGE_TAG}"
          if [ -n "$EXTRA_TAGS" ]; then
            while IFS= read -r extra; do
              [ -z "$extra" ] && continue
              TAGS="$TAGS,ghcr.io/${REPO}:$extra"
            done <<< "$EXTRA_TAGS"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            CARGO_PROFILE=${{ inputs.cargo_profile }}
          cache-from: type=gha,scope=${{ inputs.image_tag }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image_tag }}
