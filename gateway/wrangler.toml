name = "kartoteka-gateway"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
TRUSTED_ORIGINS = "https://kartoteka.pages.dev"

# Auth database (Better Auth tables: user, session, account, verification)
[[d1_databases]]
binding = "AUTH_DB"
database_name = "kartoteka-auth"
database_id = "1818f2fe-8b1c-40ba-84c1-347c59a91daf"

# OAuth token storage for MCP
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "ac4a1624550d420697c409349b5fa6be"

# Secrets — configure before first deploy:
#   wrangler secret put BETTER_AUTH_SECRET
#   wrangler secret put BETTER_AUTH_URL      (https://kartoteka-gateway.jpalczewski.workers.dev)
#   wrangler secret put MIGRATE_SECRET
#   wrangler secret put GITHUB_CLIENT_ID      (optional)
#   wrangler secret put GITHUB_CLIENT_SECRET   (optional)

# Dev (remote) environment — deployed to Cloudflare
# Secrets to set before first deploy:
#   wrangler secret put BETTER_AUTH_SECRET --env dev
#   wrangler secret put BETTER_AUTH_URL --env dev   (e.g. https://kartoteka-gateway-dev.<name>.workers.dev)
#   wrangler secret put MIGRATE_SECRET --env dev
[env.dev]
name = "kartoteka-gateway-dev"
workers_dev = true

[env.dev.vars]
TRUSTED_ORIGINS = "https://dev.kartoteka.pages.dev,https://kartoteka-dev.pages.dev"

[[env.dev.d1_databases]]
binding = "AUTH_DB"
database_name = "kartoteka-auth-dev"
database_id = "4691f730-db3d-407a-bf90-17ce018194b6"

[[env.dev.kv_namespaces]]
binding = "OAUTH_KV"
id = "6917f81d01bb4f9b839990fe93ecc9a8"

# Local dev environment
[env.local]
name = "kartoteka-gateway-local"

[env.local.vars]
DEV_AUTH_USER_ID = "dev-user-00000000-0000-0000-0000-000000000001"
BETTER_AUTH_SECRET = "dev-secret-not-for-production"
BETTER_AUTH_URL = "http://localhost:8080"
TRUSTED_ORIGINS = "http://localhost:8080,http://127.0.0.1:8080"
DEV_API_URL = "http://localhost:8787"
MIGRATE_SECRET = "dev-migrate-secret"

[[env.local.d1_databases]]
binding = "AUTH_DB"
database_name = "kartoteka-gateway-local"
database_id = "00000000-0000-0000-0000-000000000000"

[[env.local.kv_namespaces]]
binding = "OAUTH_KV"
id = "00000000-0000-0000-0000-000000000000"

[observability]
enabled = true
